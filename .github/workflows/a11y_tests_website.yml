name: Website a11y automated tests

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

jobs:
  generate-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed .md files
        id: detect_changes
        uses: tj-actions/changed-files@v44
        with:
          files: 'website/src/**/*.md'

      - name: Change .md paths to URLs
        id: generate_urls
        run: node scripts/generate_test_URLs.js "${{ steps.detect_changes.outputs.all_changed_files }}"

      - name: Build website
        run: yarn website

      - name: Start server
        run: yarn workspace @sl-design-system/website start

      - name: Run Playwright & axe-core tests
        run: npx playwright test --config=playwright.config.ts --project=website

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results
          path: reports/

      - name: Generate summary report
        run: node scripts/generate_summary.js

      - name: Comment summary on PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/summary.json';
            if (fs.existsSync(path)) {
              const summary = fs.readFileSync(path, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `### Accessibility Test Summary\n\n${summary}`
              });
            } else {
              console.log('Summary file not found.');
            }
